<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Spel</title>
  <style>
    :root {
      --skill-size: 78px;
      --joy-size: 140px;
      --joy-knob: 60px;
    }
    html, body {
      margin: 0; padding: 0; overflow: hidden; height: 100%;
      background: #000;
      touch-action: none;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    canvas { display: block; touch-action: none; }

    /* Spel-UI är dolt tills lobbyn är avklarad */
    body:not(.in-game) #hud,
    body:not(.in-game) #touch-ui,
    body:not(.in-game) #shop { display: none !important; }

    /* HUD */
    #hud {
      position: fixed; top: max(8px, env(safe-area-inset-top)); left: max(8px, env(safe-area-inset-left));
      color: #fff; font: 14px/1.3 system-ui, sans-serif;
      background: rgba(0,0,0,0.45); padding: 8px 12px; border-radius: 8px;
      pointer-events: none;
      max-width: 70vw;
    }
    #hud .hint { opacity: 0.55; font-size: 11px; margin-top: 4px; }

    /* Touch-UI – syns på touch-enheter, alltid synlig (även på desktop går det att tappa med mus om man vill) */
    #touch-ui {
      position: fixed; inset: 0; pointer-events: none;
      padding: max(12px, env(safe-area-inset-bottom));
    }

    /* Virtuell joystick (nedre vänster) */
    #joy {
      position: absolute;
      left: max(16px, env(safe-area-inset-left));
      bottom: max(16px, env(safe-area-inset-bottom));
      width: var(--joy-size); height: var(--joy-size);
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.25);
      pointer-events: auto;
      touch-action: none;
    }
    #joy-knob {
      position: absolute;
      left: 50%; top: 50%;
      width: var(--joy-knob); height: var(--joy-knob);
      margin-left: calc(var(--joy-knob) / -2); margin-top: calc(var(--joy-knob) / -2);
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      border: 2px solid rgba(255,255,255,0.6);
      pointer-events: none;
    }

    /* Skill-knappar (nedre höger) – kluster i ML-stil */
    #skills {
      position: absolute;
      right: max(16px, env(safe-area-inset-right));
      bottom: max(16px, env(safe-area-inset-bottom));
      width: calc(var(--skill-size) * 2.6);
      height: calc(var(--skill-size) * 2.6);
      pointer-events: none;
    }
    .skill {
      position: absolute;
      width: var(--skill-size); height: var(--skill-size);
      border-radius: 50%;
      background: rgba(40,60,120,0.55);
      border: 2px solid rgba(180,200,255,0.7);
      color: #fff; font: 600 14px/1 system-ui, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: auto;
      touch-action: none;
      gap: 4px;
    }
    .skill .lbl { font-size: 12px; opacity: 0.85; }
    .skill .name { font-size: 13px; font-weight: 700; }
    .skill .cd { font-size: 18px; font-weight: 700; opacity: 0; }
    .skill.cooling { background: rgba(20,20,30,0.7); border-color: rgba(140,140,160,0.5); color: rgba(255,255,255,0.55); }
    .skill.cooling .cd { opacity: 1; }
    .skill.cooling .name { opacity: 0.5; }
    .skill.active { background: rgba(80,120,220,0.8); border-color: #fff; transform: scale(1.06); }

    /* Knapparnas positioner i klustret (rätt nedre hörnet i ML-stil) */
    #skill-q { right: 0; bottom: 0; background: rgba(180,70,30,0.65); border-color: rgba(255,160,90,0.8); }
    #skill-q.cooling { background: rgba(40,25,20,0.7); }
    #skill-f { right: calc(var(--skill-size) * 0.95); bottom: calc(var(--skill-size) * 0.4); background: rgba(40,120,180,0.65); border-color: rgba(140,200,255,0.8); }
    #skill-f.cooling { background: rgba(20,30,40,0.7); }
    #skill-e { right: calc(var(--skill-size) * 0.4); bottom: calc(var(--skill-size) * 1.35); background: rgba(130,90,200,0.65); border-color: rgba(200,160,255,0.8); }
    #skill-e.cooling { background: rgba(25,20,40,0.7); }

    /* Shop (i basen) — två sektioner: hjälte-items + tier-baserad minion-shop */
    #shop {
      position: fixed;
      top: max(8px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15,25,40,0.92);
      border: 2px solid rgba(180,200,255,0.55);
      border-radius: 12px;
      padding: 8px 10px;
      display: none;
      flex-direction: column;
      gap: 6px;
      z-index: 50;
      max-width: 96vw;
      backdrop-filter: blur(2px);
    }
    #shop.visible { display: flex; }
    .shop-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .shop-section-label {
      color: #cfd8ec; font: 700 10px/1 system-ui, sans-serif;
      letter-spacing: 1.5px;
      padding: 2px 6px; opacity: 0.7;
      align-self: center;
    }
    .shop-btn {
      background: rgba(60,90,160,0.7);
      border: 1px solid rgba(200,220,255,0.55);
      border-radius: 8px;
      color: #fff;
      font: 600 11px/1.15 system-ui, sans-serif;
      padding: 6px 9px;
      min-width: 86px;
      touch-action: manipulation;
      cursor: pointer;
      text-align: center;
    }
    .shop-btn small { display: block; font-weight: 400; opacity: 0.78; margin-top: 2px; font-size: 10px; }
    .shop-btn:active { transform: scale(0.97); }
    .shop-btn:disabled { background: rgba(40,40,50,0.6); border-color: rgba(120,120,140,0.4); opacity: 0.55; cursor: not-allowed; }

    /* Lane-toggle */
    .lane-btn {
      background: rgba(50,60,90,0.7); color: #fff;
      border: 1px solid rgba(160,180,220,0.4);
      border-radius: 8px;
      padding: 6px 12px; font: 600 11px/1 system-ui, sans-serif;
      cursor: pointer; touch-action: manipulation;
    }
    .lane-btn.active { background: rgba(80,130,220,0.85); border-color: #fff; }

    /* Tier-tabs */
    .tier-btn {
      background: rgba(50,40,70,0.7); color: #fff;
      border: 1px solid rgba(160,140,200,0.4);
      border-radius: 8px;
      padding: 6px 9px; font: 600 11px/1.15 system-ui, sans-serif;
      cursor: pointer; touch-action: manipulation;
      min-width: 80px; text-align: center;
    }
    .tier-btn.active { background: rgba(120,80,200,0.85); border-color: #fff; }
    .tier-btn.locked { background: rgba(30,30,40,0.6); color: rgba(255,255,255,0.55); border-style: dashed; }
    .tier-btn.can-unlock { background: rgba(80,140,80,0.7); border-color: rgba(180,255,180,0.7); color: #fff; }
    .tier-btn small { display: block; font-weight: 400; opacity: 0.78; margin-top: 2px; font-size: 10px; }
    .tier-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Minion-knappar — färgkodade per arketyp */
    .shop-btn.minion-btn { min-width: 100px; }
    .shop-btn.minion-slasher  { background: rgba(80,60,100,0.7); border-color: rgba(180,160,220,0.5); }
    .shop-btn.minion-archer   { background: rgba(60,100,80,0.7); border-color: rgba(160,220,180,0.5); }
    .shop-btn.minion-bruiser  { background: rgba(120,80,40,0.75); border-color: rgba(220,180,120,0.55); }
    .shop-btn.minion-mage     { background: rgba(80,60,140,0.75); border-color: rgba(180,160,240,0.55); }
    .shop-btn.minion-tank     { background: rgba(70,80,110,0.75); border-color: rgba(170,190,220,0.55); }
    .shop-btn.minion-champion { background: rgba(140,60,60,0.75); border-color: rgba(240,160,160,0.6); }
    .shop-btn.minion-btn:disabled { background: rgba(40,40,50,0.6); border-color: rgba(120,120,140,0.4); }

    /* Endgame-overlay (vinst/förlust) */
    #endgame {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      display: none;
      align-items: center; justify-content: center;
      flex-direction: column;
      color: #fff; text-align: center;
      font: 18px/1.4 system-ui, sans-serif;
      z-index: 200;
      padding: 24px;
    }
    #endgame.visible { display: flex; }
    #endgame h1 { font-size: 40px; margin: 0 0 8px; }
    #endgame.win h1 { color: #88ffaa; }
    #endgame.lose h1 { color: #ff7766; }
    #endgame .info { opacity: 0.85; margin-bottom: 18px; }
    #restart-btn {
      padding: 12px 28px; font: 600 16px/1 system-ui, sans-serif;
      background: rgba(60,120,200,0.9); color: #fff;
      border: 2px solid rgba(200,220,255,0.9);
      border-radius: 10px;
      cursor: pointer;
      touch-action: manipulation;
    }
    #restart-btn:active { transform: scale(0.97); }

    /* Lobby (startskärm + anslutningsstatus) */
    #lobby {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #0d1424 0%, #1b2838 100%);
      color: #fff;
      display: flex;
      align-items: center; justify-content: center;
      flex-direction: column;
      font: 16px/1.4 system-ui, sans-serif;
      padding: 24px;
      z-index: 500;
      text-align: center;
    }
    #lobby.hidden { display: none; }
    #lobby h1 {
      font-size: 36px; margin: 0 0 6px;
      color: #ff7733;
      letter-spacing: 1px;
    }
    #lobby .sub { opacity: 0.7; margin-bottom: 28px; font-size: 13px; }
    .lobby-btn {
      background: rgba(60,120,200,0.85);
      color: #fff;
      border: 2px solid rgba(200,220,255,0.6);
      border-radius: 10px;
      padding: 14px 32px;
      font: 600 16px/1 system-ui, sans-serif;
      margin: 6px;
      cursor: pointer;
      min-width: 220px;
      touch-action: manipulation;
    }
    .lobby-btn:active { transform: scale(0.97); }
    .lobby-btn.secondary { background: rgba(40,60,90,0.7); border-color: rgba(140,160,200,0.5); }
    .lobby-btn.danger { background: rgba(140,60,60,0.7); border-color: rgba(220,150,150,0.6); }
    .lobby-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #lobby-code-input {
      background: rgba(0,0,0,0.4); color: #fff;
      border: 2px solid rgba(180,200,255,0.5);
      border-radius: 10px;
      padding: 14px 18px;
      font: 600 24px/1 ui-monospace, monospace;
      letter-spacing: 8px;
      text-align: center;
      width: 200px;
      text-transform: uppercase;
      margin: 6px 0;
    }
    #lobby-code-display {
      font: 700 56px/1 ui-monospace, monospace;
      letter-spacing: 14px;
      color: #88ccff;
      background: rgba(0,0,0,0.45);
      padding: 18px 24px;
      border-radius: 12px;
      border: 2px solid rgba(140,180,240,0.5);
      margin: 14px 0;
      cursor: pointer;
      user-select: all; -webkit-user-select: all;
    }
    #lobby .msg { opacity: 0.85; margin: 10px 0; min-height: 22px; }
    #lobby .err { color: #ff8877; font-weight: 600; }
    .lobby-panel { display: none; flex-direction: column; align-items: center; }
    .lobby-panel.visible { display: flex; }

    /* Porträtt-varning */
    #orient {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      color: #fff;
      display: none;
      align-items: center; justify-content: center;
      flex-direction: column;
      text-align: center;
      font: 16px/1.4 system-ui, sans-serif;
      padding: 24px;
      z-index: 1000;
    }
    #orient .icon { font-size: 56px; margin-bottom: 12px; }
    @media (orientation: portrait) and (pointer: coarse) {
      #orient { display: flex; }
    }

    /* Desktop-tips */
    @media (pointer: fine) {
      #hud .hint::after { content: " · på dator: WASD + Q/F/E"; }
    }
  </style>
</head>
<body>
  <div id="lobby">
    <h1>SPEL</h1>
    <div class="sub">Hero Line Wars · 1v1</div>

    <div class="lobby-panel visible" id="lobby-main">
      <button class="lobby-btn" id="btn-host">Host Game</button>
      <button class="lobby-btn" id="btn-join">Join Game</button>
      <button class="lobby-btn secondary" id="btn-solo">Singleplayer</button>
    </div>

    <div class="lobby-panel" id="lobby-hosting">
      <div>Din rumskod:</div>
      <div id="lobby-code-display">----</div>
      <div class="msg" id="lobby-host-msg">Förbereder...</div>
      <button class="lobby-btn danger" id="btn-host-cancel">Avbryt</button>
    </div>

    <div class="lobby-panel" id="lobby-joining">
      <div>Ange 4-tecken kod:</div>
      <input id="lobby-code-input" maxlength="4" autocomplete="off" autocapitalize="characters" inputmode="text" />
      <button class="lobby-btn" id="btn-join-connect">Anslut</button>
      <div class="msg" id="lobby-join-msg"></div>
      <button class="lobby-btn secondary" id="btn-join-back">Tillbaka</button>
    </div>
  </div>

  <div id="hud">
    <div id="status">Förbereder...</div>
    <div class="hint">vänster: rörelse · höger: tap eller drag-sikta</div>
  </div>

  <div id="touch-ui">
    <div id="joy"><div id="joy-knob"></div></div>
    <div id="skills">
      <button class="skill" id="skill-e" data-key="e"><span class="name">Blink</span><span class="lbl">E</span><span class="cd"></span></button>
      <button class="skill" id="skill-f" data-key="f"><span class="name">Frost</span><span class="lbl">F</span><span class="cd"></span></button>
      <button class="skill" id="skill-q" data-key="q"><span class="name">Eldklot</span><span class="lbl">Q</span><span class="cd"></span></button>
    </div>
  </div>

  <div id="shop">
    <div class="shop-row">
      <span class="shop-section-label">HJÄLTE</span>
      <div class="shop-row" id="shop-hero-row"></div>
    </div>
    <div class="shop-row">
      <span class="shop-section-label">MINIONS</span>
      <div class="shop-row" id="shop-lane-row"></div>
      <div class="shop-row" id="shop-tier-row"></div>
    </div>
    <div class="shop-row" id="shop-minion-grid"></div>
  </div>

  <div id="endgame">
    <h1 id="endgame-title"></h1>
    <div class="info" id="endgame-info"></div>
    <button id="restart-btn">Spela igen</button>
  </div>

  <div id="orient">
    <div class="icon">🔄</div>
    <div><strong>Rotera enheten till landskap</strong><br>Spelet är gjort för bredskärm.</div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
