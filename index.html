<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Spel</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; }
    canvas { display: block; }
    #hud {
      position: fixed; top: 8px; left: 8px;
      color: #fff; font: 13px/1.3 system-ui, sans-serif;
      background: rgba(0,0,0,0.4); padding: 6px 10px; border-radius: 6px;
      pointer-events: none; user-select: none;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.170.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="hud">
    <div id="status">Förbereder...</div>
    <div style="opacity: 0.5; font-size: 11px; margin-top: 4px;">WASD / piltangenter · Q eldklot · F frostnova · E blink</div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
